curves:
# Curve 0
- events:
  - { type: 0, delay: 0, params: 0 } # SETTIME @ 0
  - { type: -1, delay: 0, params: 612 } # SETDURATION @ 0
  - { type: 3, delay: 0, params: 0x0 } # OVERRIDE @ 0

  # Add cinema letterboxing
  - { type: 11, delay: 0, params: 1 } # CODE
  - { code_type: 6, val1: 0x13, val2: 0x0 } # 6 (ENABLE_LETTERBOX)

  # Lock player
  - { type: 11, delay: 0, params: 1 } # CODE
  - { code_type: 6, val1: 0x25, val2: 1 } # 6 (TOGGLE_PLAYER_CONTROL | OFF)

  # Enable objectGroup 8 (waterfall texscrolls)
  - { type: 11, delay: 0, params: 1 } # CODE
  - { code_type: 6, val1: 0x1B, val2: 8 } # 6 (ENABLE_OBJ_GROUP)

  # Enable objectGroups 6,7 (objects by the river)
  - { type: 11, delay: 0, params: 2 } # CODE
  - { code_type: 6, val1: 0x1B, val2: 6 } # 6 (ENABLE_OBJ_GROUP)
  - { code_type: 6, val1: 0x1B, val2: 7 } # 6 (ENABLE_OBJ_GROUP)

  #Camera shake 
  # (NOTE: normally requires player to be close by, but we don't know where player will be
  # because they could shoot the barrel from quite far away. To deal with this, the camera shake 
  # command has been modified to ignore the player distance check when bit 0x80 of val2 is set)
  - { type: 11, delay: 30, params: 1 } # CODE @ 261
  - { code_type: 6, val1: 0x7, val2: 0x8C } # 6 (CAMERA_SHAKE)

  # Make sure river bits are set
  - { type: 13, delay: 0, params: 0xB000 } # ENVFX (SET_BIT)
  - { type: 127, delay: 0, params: 0x920 } # PARAM
  - { type: 13, delay: 0, params: 0xB000 } # ENVFX (SET_BIT)
  - { type: 127, delay: 0, params: 0x921 } # PARAM

  # Enable objectGroup 20 (WaveAnimators)
  - { type: 0, delay: 0, params: 425 } # SETTIME @ 0
  - { type: 11, delay: 0, params: 1 } # CODE
  - { code_type: 6, val1: 0x1B, val2: 20 } # 6 (ENABLE_OBJ_GROUP)

  # Remove cinema letterboxing
  - { type: 0, delay: 0, params: 612 } # SETTIME @ 0
  - { type: 11, delay: 0, params: 1 } # CODE @ 1754
  - { code_type: 6, val1: 0x1E, val2: 0x0 } # 6 (DISABLE_LETTERBOX)

  # Disable objectGroups 6,7 (objects by the river)
  - { type: 11, delay: 0, params: 2 } # CODE
  - { code_type: 6, val1: 0x1C, val2: 6 } # 6 (ENABLE_OBJ_GROUP)
  - { code_type: 6, val1: 0x1C, val2: 7 } # 6 (ENABLE_OBJ_GROUP)

  # Disable objectGroup 7 (waterfall texscrolls)
  - { type: 11, delay: 0, params: 1 } # CODE @ 171
  - { code_type: 6, val1: 0x1C, val2: 8 } # 6 (DISABLE_OBJ_GROUP)
  # Disable objectGroup 20 (WaveAnimators)
  - { type: 11, delay: 0, params: 1 } # CODE @ 171
  - { code_type: 6, val1: 0x1C, val2: 20 } # 6 (DISABLE_OBJ_GROUP)

  # Unlock player
  - { type: 11, delay: 0, params: 1 } # CODE
  - { code_type: 6, val1: 0x25, val2: 0 } # 6 (TOGGLE_PLAYER_CONTROL | ON)

  - { type: 11, delay: 0, params: 1 } # CODE @ 612
  - { code_type: 6, val1: 0x0, val2: 0x0 } # 6 (0)
